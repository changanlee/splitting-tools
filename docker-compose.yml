# Single-Postgres monolith: db carries app tables + pg-boss queue +
# cost/rate counters (no Redis — DAU<10k stage-0 playbook).
# Compose auto-loads .env (gitignored); inline defaults keep this runnable
# out of the box.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-splitting}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-splitting}"]
      interval: 3s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/splitting}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-}
      IP_HASH_SECRET: ${IP_HASH_SECRET:-}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    # Survive transient DB blips (mac sleep / db recovery mode). The
    # worker's pg-boss error handler exits non-zero on purpose — let
    # the orchestrator bring it back.
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/splitting}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-}
      IP_HASH_SECRET: ${IP_HASH_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    # Survive transient DB blips (mac sleep / db recovery mode). The
    # worker's pg-boss error handler exits non-zero on purpose — let
    # the orchestrator bring it back.
    restart: unless-stopped

volumes:
  db_data:
